name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  html-validate:
    name: Validate HTML & CSS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install html5validator
        run: pip install html5validator

      - name: Validate HTML and CSS
        # The bundled Nu (vnu.jar) CSS backend is years behind the spec, so it
        # flags valid modern CSS as errors. We ignore those known false
        # positives while still catching real HTML/CSS mistakes:
        #   - inset / backdrop-filter / aspect-ratio / scrollbar-* : valid CSS
        #     properties the checker doesn't recognise.
        #   - linear-gradient "too few values" : raised because the checker
        #     can't resolve CSS custom properties, e.g. var(--cyan).
        run: |
          html5validator --root . --also-check-css \
            --ignore-re \
              'CSS: "inset"' \
              'CSS: "backdrop-filter"' \
              'CSS: "scrollbar-width"' \
              'CSS: "scrollbar-color"' \
              'CSS: "aspect-ratio"' \
              'too few values for the property "linear-gradient"'

  link-check:
    name: Check internal links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify internal links resolve to real files
        run: |
          python3 - <<'PY'
          import os, re, sys
          from urllib.parse import urldefrag, unquote

          attr_re = re.compile(r'(?:href|src)\s*=\s*["\']([^"\']+)["\']', re.IGNORECASE)
          skip_schemes = ('http://', 'https://', 'mailto:', 'tel:', 'data:', 'javascript:')

          broken = []
          for dirpath, _, filenames in os.walk('.'):
              if '/.git' in dirpath:
                  continue
              for fn in filenames:
                  if not fn.endswith('.html'):
                      continue
                  path = os.path.join(dirpath, fn)
                  with open(path, encoding='utf-8') as f:
                      html = f.read()
                  for raw in attr_re.findall(html):
                      link = raw.strip()
                      if not link or link.startswith('#') or link.lower().startswith(skip_schemes):
                          continue
                      target = unquote(urldefrag(link)[0])
                      if not target:
                          continue
                      resolved = os.path.normpath(os.path.join(dirpath, target))
                      if not os.path.exists(resolved):
                          broken.append(f"{path}: {link} -> {resolved}")

          if broken:
              print("Broken internal links found:")
              for b in broken:
                  print("  " + b)
              sys.exit(1)
          print("All internal links resolve.")
          PY
