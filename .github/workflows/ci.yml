name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  html-validate:
    name: Validate HTML & CSS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install html5validator
        run: pip install html5validator

      - name: Validate HTML and CSS
        run: html5validator --root . --also-check-css

  link-check:
    name: Check internal links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify internal links resolve to real files
        run: |
          python3 - <<'PY'
          import os, re, sys
          from urllib.parse import urldefrag, unquote

          attr_re = re.compile(r'(?:href|src)\s*=\s*["\']([^"\']+)["\']', re.IGNORECASE)
          skip_schemes = ('http://', 'https://', 'mailto:', 'tel:', 'data:', 'javascript:')

          broken = []
          for dirpath, _, filenames in os.walk('.'):
              if '/.git' in dirpath:
                  continue
              for fn in filenames:
                  if not fn.endswith('.html'):
                      continue
                  path = os.path.join(dirpath, fn)
                  with open(path, encoding='utf-8') as f:
                      html = f.read()
                  for raw in attr_re.findall(html):
                      link = raw.strip()
                      if not link or link.startswith('#') or link.lower().startswith(skip_schemes):
                          continue
                      target = unquote(urldefrag(link)[0])
                      if not target:
                          continue
                      resolved = os.path.normpath(os.path.join(dirpath, target))
                      if not os.path.exists(resolved):
                          broken.append(f"{path}: {link} -> {resolved}")

          if broken:
              print("Broken internal links found:")
              for b in broken:
                  print("  " + b)
              sys.exit(1)
          print("All internal links resolve.")
          PY
